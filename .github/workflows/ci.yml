name: CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend   # 🔥 THIS IS CRITICAL

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

    - name: Build Docker image
      run: docker build -t sathvikayyasamy/blinkit-backend .

    - name: Scan Docker image with Trivy
      uses: aquasecurity/trivy-action@v0.24.0
      with:
        image-ref: sathvikayyasamy/blinkit-backend:latest
        format: table
        exit-code: 1
        severity: CRITICAL

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker image
      run: |
        docker tag sathvikayyasamy/blinkit-backend sathvikayyasamy/blinkit-backend:latest
        docker push sathvikayyasamy/blinkit-backend:latest
