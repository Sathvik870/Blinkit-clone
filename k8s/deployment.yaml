apiVersion: apps/v1
kind: Deployment

metadata:
  name: blinkit-backend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: blinkit-backend

  template:
    metadata:
      labels:
        app: blinkit-backend

    spec:
      containers:
        - name: blinkit-backend

          image: sathvikayyasamy/blinkit-backend-app:latest

          imagePullPolicy: Always

          ports:
            - containerPort: 5000
